name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config python3-pip

      - name: Install buildozer
        run: |
          pip install buildozer cython

      - name: Build APK
        run: |
          cd ${{ github.workspace }}
          ls -la buildozer.spec
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: knotphotoeditor-apk
          path: bin/*.apk
